# 🎬 Bonus exceptionnel (+5 points) — “Netflix maison” avec Docker

> Ce bonus est **optionnel**, mais permet de démontrer une **maîtrise avancée de Docker, docker-compose et de l’architecture de services**.

## 🎯 Objectif

Mettre en place, via **un seul `docker-compose.yml`**, un **système complet de gestion et de diffusion multimédia** de type “Netflix personnel”.

## 🧱 Stack logicielle imposée

Votre stack doit contenir **au minimum** les services suivants :

- **Jellyfin** — Media server (lecture vidéo / musique / séries)
- **Bazarr** — Gestion des sous-titres
- **Radarr** — Gestion des films
- **Sonarr** — Gestion des séries
- **Lidarr** — Gestion de la musique
- **Readarr** — Gestion des livres
- **Prowlarr** — Gestion des indexeurs
- **qBittorrent** — Client de téléchargement

## 🏗️ Contraintes techniques

- Tous les services doivent :
  - Tourner via **un seul `docker-compose.yml`**
  - Être sur **un ou plusieurs réseaux Docker cohérents**
  - Partager correctement leurs **volumes** (médias, téléchargements, configs)
- Les services doivent :
  - Se voir entre eux (ex : Radarr → qBittorrent)
  - Avoir leurs données **persistantes**
- **Aucun port ne doit être exposé inutilement** (idéalement accès via Traefik si intégré au projet principal)

## 🌐 Accès

- Idéalement, tous les services sont accessibles :
  - soit via Traefik (ex : `jellyfin.localhost`, `radarr.localhost`, etc.)
  - soit au minimum via le navigateur en local

