# Barème (sur 20)

## 🧱 Architecture & Docker — 8 points

| Critère | Points |
|--------|---------|
| Traefik fonctionne et route correctement les 3 services | 2 |
| Aucun service (hors Traefik) n’expose de port directement | 1 |
| Réseaux Docker correctement utilisés et cohérents | 1 |
| Volumes correctement utilisés (au moins pour Home Assistant et/ou site3) | 2 |
| Le projet démarre et s’arrête proprement avec `docker compose up` / `down` | 2 |

---

## 🌐 Services — 6 points

| Critère | Points |
|--------|---------|
| Site1 (Next.js) fonctionne et est accessible via `site1.localhost` | 2 |
| Home Assistant fonctionne, est accessible via `ha.localhost` et conserve sa configuration après redémarrage | 2 |
| Site3 est pertinent, fonctionnel, accessible via `site3.localhost` et justifié dans le README | 2 |

---

## 📄 Documentation & compréhension — 4 points

| Critère | Points |
|--------|---------|
| README clair, structuré, expliquant le lancement, les URLs, les réseaux, les volumes et le rôle de Traefik | 2 |
| L’étudiant est capable d’expliquer son architecture et ses choix techniques | 2 |

---

## 🧹 Qualité & rigueur — 2 points

| Critère | Points |
|--------|---------|
| Projet propre, lisible, structuré (noms clairs, pas de fichiers inutiles, arborescence cohérente) | 1 |
| Pas de bricolage (pas de `network_mode: host`, pas de ports exposés inutilement, pas de hacks incohérents) | 1 |

---

## 🏆 Bonus

| Bonus | Points |
|-------|---------|
| Plusieurs applications en plus | +1 |
| Sécurité renforcée (réseaux internes, cloisonnement, etc.) | +1 |


### Observations


Ce projet évalue votre capacité à :

	•	Raisonner en architecture
	•	Comprendre Docker comme outil d’infrastructure
	•	Produire un système propre, reproductible et explicable

Phrase clé

    “Si je supprime tout et que je fais docker compose up, tout doit revenir.”
    
    

