# Docker & Architecture de services

## Contexte

Vous êtes en charge de mettre en place une plateforme web multi-services conteneurisée en utilisant Docker.

L’objectif n’est pas de faire du développement applicatif avancé, mais de :

Concevoir une architecture propre, reproductible, documentée, et maîtrisée avec Docker.

Vous devez déployer 3 applications web distinctes derrière un seul reverse proxy.

## Architecture cible

Vous devez mettre en place :
* 1 reverse proxy (Traefik)
* 3 “sites” accessibles via navigateur



| URL | Service |
| -------- | -------- |
| http://site1.localhost     | Next.js “Hello World”     |
| http://ha.localhost     | Home Assistant |
| http://site2.localhost     | Application de votre choix     |

Tous les services doivent :
	•	Tourner uniquement via docker compose
	•	Être derrière Traefik
	•	Ne pas exposer directement leurs ports
    
Bonus de +1 point (max 3), par autre application déployée

## Contraintes techniques

    Reverse proxy
        •	Vous devez utiliser Traefik
        •	Traefik doit :
        •	écouter sur le port 80
        •	router selon le Host
        •	ne pas exposer les conteneurs par défaut

## Sites
### Site 1 — Next.js
	•	Une application Next.js minimale :
	•	Page “Hello world”
	•	Elle doit :
	•	Être buildée via un Dockerfile
	•	Être accessible sur site1.localhost
	•	Le code doit être dans un dossier site1/
    
### Site 2 — Home Assistant
	•	Vous devez utiliser l’image officielle Home Assistant
	•	La configuration doit être persistante via un volume
	•	Le service doit être accessible sur ha.localhost
	•	Vous devez :
	•	Créer un utilisateur
	•	Vérifier que la config survit à un redémarrage du conteneur
    
### Site 3 — Projet libre

Vous devez choisir un projet depuis :

https://awesome-docker-compose.com/ (ou autre)

Contraintes :
	•	Doit avoir une interface web
	•	Doit être :
	•	Intégré derrière Traefik
	•	Accessible via site3.localhost

## Structure attendue du projet
```
projet-docker/
 ├── README.md
 ├── site1/
 │    ├── Dockerfile
 │    ├── docker-compose.yml
 │    └── (code Next.js)
 ├── ha/
 │    ├── docker-compose.yml
 │    └── config
 └── site3/
      ├── docker-compose.yml
      └── (selon votre projet)
```

## Readme(obligatoire)

    Il doit contenir :
        •	Comment lancer le projet
        •	Les URLs des 3+ services
        •	Le détail du site3 :
            •	comment il fonctionne
            •	ce qu’il stocke
            
## Éléments de validation lors de la soutenance / correction

    On vérifiera :
        •	docker compose up fonctionne sans erreur
        •	Les 3 URLs répondent dans le navigateur
        •	Aucun service (sauf Traefik) n’expose de port directement
        •	Home Assistant conserve sa config après redémarrage
        •	Le site3 est fonctionnel et non trivial
        •	Vous savez expliquer votre architecture


