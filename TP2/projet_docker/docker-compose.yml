services:
  traefik:
    image: traefik:v3.1
    container_name: traefik
    command:
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
    volumes:
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    networks:
      - traefik

  site1:
    build:
      context: ./site1
      dockerfile: Dockerfile
    depends_on:
      - traefik
    labels:
      - traefik.enable=true
      - traefik.http.routers.site1.rule=Host(`site1.localhost`)
      - traefik.http.routers.site1.entrypoints=web
      - traefik.http.services.site1.loadbalancer.server.port=3000
    networks:
      - traefik

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    restart: unless-stopped
    environment:
      - TZ=Europe/Paris
    volumes:
      - ./ha/config:/config
    depends_on:
      - traefik
    labels:
      - traefik.enable=true
      - traefik.http.routers.ha.rule=Host(`ha.localhost`)
      - traefik.http.routers.ha.entrypoints=web
      - traefik.http.services.ha.loadbalancer.server.port=8123
    networks:
      - traefik

  site3:
    build:
      context: ./site3
      dockerfile: Dockerfile
    container_name: site3
    depends_on:
      - traefik
    labels:
      - traefik.enable=true
      - traefik.http.routers.site3.rule=Host(`site3.localhost`)
      - traefik.http.routers.site3.entrypoints=web
      - traefik.http.services.site3.loadbalancer.server.port=80
    networks:
      - traefik

  site4:
    build:
      context: ./site4
      dockerfile: Dockerfile
    container_name: site4
    depends_on:
      - traefik
    labels:
      - traefik.enable=true
      - traefik.http.routers.site4.rule=Host(`site4.localhost`)
      - traefik.http.routers.site4.entrypoints=web
      - traefik.http.services.site4.loadbalancer.server.port=80
    networks:
      - traefik

  site5:
    build:
      context: ./site5
      dockerfile: Dockerfile
    container_name: site5
    depends_on:
      - traefik
    labels:
      - traefik.enable=true
      - traefik.http.routers.site5.rule=Host(`site5.localhost`)
      - traefik.http.routers.site5.entrypoints=web
      - traefik.http.services.site5.loadbalancer.server.port=80
    networks:
      - traefik

  # === BONUS: Stack Média Netflix Maison ===
  
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
    volumes:
      - ./media/configs/jellyfin:/config
      - ./media/movies:/data/movies
      - ./media/shows:/data/tvshows
      - ./media/music:/data/music
    depends_on:
      - traefik
    networks:
      - traefik
      - media

  radarr:
    image: linuxserver/radarr:latest
